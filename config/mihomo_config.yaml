# ==========================================
# Mihomo (Clash Meta) Configuration
# ==========================================
mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
ipv6: true
external-controller: 0.0.0.0:9090
# secret: "your-secret-here" # 🔑 默认不启用，请手动配置

# ----------------------------------------
# 1. 这里是【定义】的地方
# ----------------------------------------
proxy-providers:
  MySubscription:  # <--- 名字在这里定义！你可以改成 "Airport" 或 "SubStore"
    type: http
    url: "https://你的订阅链接.com/..." # <--- 链接填在这里！！
    path: ./proxies/subs.yaml
    interval: 3600

# ----------------------------------------
# 2. 这里是【引用】的地方
# ----------------------------------------

proxy-groups:
  # ==========================================
  # 第一层：资源筛选池 (Pools)
  # ==========================================

  # 1. 日本线路池 - 自动选择 (你的要求：日本中转单独一组，自动选)
  - name: 🚄 日本线路-自动
    type: url-test
    use:
      - MySubscription
    filter: '(?i)\[Line\].*(日本|JP|Japan|Tokyo|Osaka)'
    url: http://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50

  # 2. 全球线路池 - 手动选择 (你的要求：所有线路放一组，手动选)
  - name: 🚄 线路手动盘
    type: select
    use:
      - MySubscription
    filter: '(?i)\[Line\]'
    icon: https://testingcf.jsdelivr.net/gh/shindgewongxj/WHATSINStash@master/icon/select.png

  # ==========================================
  # 第二层：链式代理组 (Chains / Relays)
  # ==========================================

  # 链式 A：日本极速链 (满足要求：日本线路自动 -> 日本落地)
  - name: 极速日本
    type: select
    use:
      - MySubscription
    filter: '(?i)\[Landing\].*(日本|JP|Japan|Tokyo|Osaka)'
    dialer-proxy: 🚄 日本线路-自动

  # 链式 B：美国/全球手动链 (满足要求：手动选线路 -> 美国落地)
  - name: 极速美国
    type: select # 已改为手动 select
    use:
      - MySubscription
    filter: '(?i)\[Landing\].*(美国|US|United States|America)'
    # url: http://cp.cloudflare.com/generate_204 # Manual select 不需要 url-test
    # interval: 300
    dialer-proxy: 🚄 线路手动盘

  # 链式 C：通用手动链 (满足要求：手动选线路 -> 美日以外落地)
  - name: 极速全球
    type: select
    use:
      - MySubscription
    filter: '(?i)\[Landing\]'
    exclude-filter: '(?i)(日本|JP|Japan|Tokyo|Osaka|美国|US|United States|America)'
    dialer-proxy: 🚄 线路手动盘

  # 链式 D：测试链式 (User Requested)
  - name: 🧪 测试链式
    type: relay
    proxies:
      - "[Line]JP_Relay-01"   # 确保名字在节点列表里完全一致
      - "[Landing]🇯🇵 日本东京落地-ss" # 确保名字在节点列表里完全一致 

  # ==========================================
  # 第三层：业务策略组 (Services)
  # ==========================================

  - name: 节点选择
    type: select
    icon: https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Proxy.png
    proxies:
      - 极速日本
      - 极速美国
      - 极速全球
      - 🚄 线路手动盘
      - DIRECT
      - 🧪 测试链式

  - name: OpenAI
    type: select
    icon: https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Bot.png
    proxies:
      - 极速美国
      - 极速全球

  - name: 哔哩哔哩
    type: select
    icon: https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/bilibili.png
    proxies:
      - 极速日本
      - 极速全球

  - name: 油管视频
    type: select
    icon: https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/YouTube.png
    proxies:
      - 极速日本
      - 极速美国
