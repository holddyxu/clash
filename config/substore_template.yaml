# ==========================================
# Sub-Store Complete Config Template for Mihomo
# ==========================================
# 此模板用于 Sub-Store "文件" 功能
# Sub-Store 会将节点自动注入到 proxies: 下方
# ==========================================

# 基础设置
mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
ipv6: false
external-controller: 0.0.0.0:9090
# secret: "your-secret-here"

# TUN 设置（虚拟网卡模式，全局模式需要）
tun:
  enable: true
  stack: mixed
  auto-route: true
  auto-redirect: false
  auto-detect-interface: true
  dns-hijack:
    - any:53
  mtu: 1500

# DNS 设置（TUN + 全局模式专用配置）
dns:
  enable: true
  ipv6: false
  enhanced-mode: redir-host
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - 'https://doh.pub/dns-query'
    - 'https://dns.alidns.com/dns-query'
  direct-nameserver:
    - 'https://doh.pub/dns-query'
    - 'https://dns.alidns.com/dns-query'
    - 223.5.5.5
  fallback:
    - 'https://1.1.1.1/dns-query'
    - 'https://dns.google/dns-query'
  fallback-filter:
    geoip: true
    geoip-code: CN
    domain:
      - '+.google.com'
      - '+.facebook.com'
      - '+.youtube.com'
  proxy-server-nameserver:
    - 'https://doh.pub/dns-query'
    - 'https://dns.alidns.com/dns-query'
  respect-rules: true

# ==========================================
# proxies: 将由 Sub-Store 自动填充
# ==========================================

# ==========================================
# 策略组 - 链式代理架构
# ==========================================
proxy-groups:
  # ====================
  # 线路节点池（直连中转，非链式）
  # ====================

  # 日本线路 - 自动选择
  - name: 🇯🇵 日本线路-自动
    type: url-test
    include-all-proxies: true
    filter: '(?i)^\[Line\].*(JP|日本)'
    url: http://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50

  # 美国线路 - 自动选择
  - name: 🇺🇸 美国线路-自动
    type: url-test
    include-all-proxies: true
    filter: '(?i)^\[Line\].*(US|美国)'
    url: http://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50

  # 全部线路 - 手动选择
  - name: 🚄 中转线路选择
    type: select
    include-all-proxies: true
    filter: '(?i)^\[Line\]'
    icon: https://testingcf.jsdelivr.net/gh/shindgewongxj/WHATSINStash@master/icon/select.png

  # ====================
  # 地区落地组（链式节点，已由 Sub-Store 处理好）
  # ====================

  # 日本落地链式节点 + 日本线路
  - name: 极速日本
    type: select
    include-all-proxies: true
    filter: '(?i)(\[Landing\].*🇯🇵|^\[Line\].*JP)'
    icon: https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Japan.png

  # 美国落地链式节点 + 美国线路
  - name: 极速美国
    type: select
    include-all-proxies: true
    filter: '(?i)(\[Landing\].*🇺🇸|^\[Line\].*US)'
    icon: https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/United_States.png

  # 香港落地链式节点
  - name: 极速香港
    type: url-test
    include-all-proxies: true
    filter: '(?i)\[Landing\].*🇭🇰'
    url: http://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 100
    icon: https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Hong_Kong.png

  # 台湾落地链式节点
  - name: 极速台湾
    type: url-test
    include-all-proxies: true
    filter: '(?i)\[Landing\].*🇹🇼'
    url: http://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 100
    icon: https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Taiwan.png

  # 其他地区落地链式节点（排除日美港台）
  - name: 极速全球
    type: url-test
    include-all-proxies: true
    filter: '(?i)\[Landing\]'
    exclude-filter: '(?i)(🇯🇵|🇺🇸|🇭🇰|🇹🇼)'
    url: http://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 100
    icon: https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Global.png

  # ====================
  # 第三层：业务策略组
  # ====================

  - name: 节点选择
    type: select
    icon: https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Proxy.png
    proxies:
      - 极速日本
      - 极速美国
      - 极速全球
      - 极速香港
      - 极速台湾
      - 🚄 中转线路选择
      - DIRECT

  - name: OpenAI
